version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: connect-amravati-app
    restart: unless-stopped
    ports:
      - "8000:9000"
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=connect_amravati
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret_postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=connect_amravati
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret_postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
